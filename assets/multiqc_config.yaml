report_comment: >
  This report has been generated by a custom automated RNA-seq pipeline. 
  Integrated analysis includes Quality Control, Alignment, Differential Expression, 
  TME Deconvolution, and Alternative Splicing.
title: "RNA-seq Analysis Report"

# ==============================================================================
# IMPOSTAZIONI GLOBALI NF-CORE
# ==============================================================================
export_plots: true
disable_version_detection: true

extra_fn_clean_exts:
  - "_mqc"
  - ".markdup"
  - "_val"

table_columns_visible:
  fastqc:
    percent_duplicates: False

# ==============================================================================
# 1. ORDINE E RINOMINAZIONE DEI MODULI NATIVI
# ==============================================================================
module_order:
  - fastqc:
      name: "FastQC (Raw Reads)"
      info: "Initial quality control of sequencing reads."
  - cutadapt:
      name: "Trim Galore"
      info: "Adapter trimming and quality filtering."
  - star:
      name: "STAR Alignment"
      info: "Alignment rates to the reference genome."
  - featurecounts:
      name: "featureCounts"
      info: "Gene-level read quantification."

# ==============================================================================
# 2. ORDINE DELLE SEZIONI CUSTOM
# ==============================================================================

report_section_order:
  id_deseq2_summary:
    order: 960
  id_deseq2_pca:
    order: 950
  id_deseq2_volcano:
    order: 940
  id_enrichr_reactome:
    order: 930
  id_enrichr_kegg:
    order: 920
  id_enrichr_go:
    order: 910
  id_imsig_abundance:
    order: 900
  id_imsig_plot:
    order: 890
  id_immucellai_abundance:
    order: 880
  id_immucellai_plot:
    order: 870
  arriba_fusions:        
    order: 860
  id_rmats_summary:
    order: 850
  id_rmats_volcano:
    order: 840
  id_darts_summary:
    order: 830
  id_darts_volcano:
    order: 820

# ==============================================================================
# 3. TITLES
# ==============================================================================
custom_data:
  id_deseq2_summary:
    section_name: "DESeq2: Expression Summary"
  id_deseq2_pca:
    section_name: "DESeq2: PCA Plot"
  id_deseq2_volcano:
    section_name: "DESeq2: Volcano Plot"
  id_enrichr_reactome:
    section_name: "EnrichR: Reactome Pathway"
  id_enrichr_kegg:
    section_name: "EnrichR: KEGG Pathway"
  id_enrichr_go:
    section_name: "EnrichR: GO Biological Process"
  id_imsig_abundance:
    section_name: "ImSig: Deconvolution Data"
  id_imsig_plot:
    section_name: "ImSig: Composition Plot"
  id_immucellai_abundance:
    section_name: "ImmuCellAI: Fractions Data"
  id_immucellai_plot:
    section_name: "ImmuCellAI: Deconvolution Plot"
  id_rmats_summary:
    section_name: "rMATS: Event Summary"
  id_rmats_volcano:
    section_name: "rMATS: Volcano Plot"
  id_darts_summary:
    section_name: "DARTS: Event Summary"
  id_darts_volcano:
    section_name: "DARTS: Volcano Plot"

# ==============================================================================
# 4. SEARCH PATTERNS
# ==============================================================================
sp:
  id_deseq2_summary: {fn: "deseq2_summary_mqc.txt"}
  id_deseq2_pca: {fn: "*pca_mqc.png"}
  id_deseq2_volcano: {fn: "*volcano_mqc.png"}
  id_enrichr_reactome: {fn: "*Reactome*_mqc.png"}
  id_enrichr_kegg: {fn: "*KEGG*_mqc.png"}
  id_enrichr_go: {fn: "*Biological_Process*_mqc.png"}
  id_imsig_abundance: {fn: "imsig_abundance_mqc.txt"}
  id_imsig_plot: {fn: "imsig_plot_mqc.png"}
  id_immucellai_abundance: {fn: "immucellai_abundance_mqc.txt"}
  id_immucellai_plot: {fn: "Stacked_Barplot_mqc.png"}
  id_rmats_summary: {fn: "rMATS_Summary_BarChart_mqc.png"}
  id_rmats_volcano: {fn: "rMATS_Volcano_SE_mqc.png"}
  id_darts_summary: {fn: "DARTS_AI_Summary_BarChart_mqc.png"}
  id_darts_volcano: {fn: "DARTS_AI_Volcano_SE_mqc.png"}
