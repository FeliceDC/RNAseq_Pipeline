report_comment: "Automated RNA-seq pipeline report. Integrated analysis includes Quality Control, Alignment, Differential Expression, TME Deconvolution, and Alternative Splicing."
title: "RNA-seq Analysis Report"

export_plots: true
disable_version_detection: true

extra_fn_clean_exts:
  - "_mqc"
  - ".markdup"
  - "_val"

table_columns_visible:
  fastqc:
    percent_duplicates: False

# 1. ORDINE DEI MODULI NATIVI
module_order:
  - fastqc:
      name: "FastQC (Raw Reads)"
  - cutadapt:
      name: "Trim Galore"
  - star:
      name: "STAR Alignment"
  - featurecounts:
      name: "featureCounts"

# 2. ORDINE DI IMPAGINAZIONE CUSTOM (Numeri negativi per stare sotto ai nativi)
report_section_order:
  deseq2_summary:
    order: -10
  deseq2_pca:
    order: -20
  deseq2_volcano:
    order: -30
  Barplot_Reactome_2022:
    order: -40
  Barplot_KEGG_2026:
    order: -50
  Barplot_GO_Biological_Process_2023:
    order: -60
  imsig_abundance:
    order: -70
  imsig_plot:
    order: -80
  immucellai_abundance:
    order: -90
  Stacked_Barplot:
    order: -100
  arriba_fusions:
    order: -110
  rMATS_Summary_BarChart:
    order: -120
  rMATS_Volcano_SE:
    order: -130
  DARTS_AI_Summary_BarChart:
    order: -140
  DARTS_AI_Volcano_SE:
    order: -150

# 3. TITOLI ELEGANTI (Rinomina la barra laterale)
custom_data:
  deseq2_summary:
    section_name: "2. DESeq2: Expression Summary"
  deseq2_pca:
    section_name: "2. DESeq2: PCA Plot"
  deseq2_volcano:
    section_name: "2. DESeq2: Volcano Plot"
  Barplot_Reactome_2022:
    section_name: "3. EnrichR: Reactome Pathway"
  Barplot_KEGG_2026:
    section_name: "3. EnrichR: KEGG Pathway"
  Barplot_GO_Biological_Process_2023:
    section_name: "3. EnrichR: GO Biological Process"
  imsig_abundance:
    section_name: "4. ImSig: Deconvolution Data"
  imsig_plot:
    section_name: "4. ImSig: Composition Plot"
  immucellai_abundance:
    section_name: "5. ImmuCellAI: Fractions Data"
  Stacked_Barplot:
    section_name: "5. ImmuCellAI: Deconvolution Plot"
  rMATS_Summary_BarChart:
    section_name: "7. rMATS: Event Summary"
  rMATS_Volcano_SE:
    section_name: "7. rMATS: Volcano Plot"
  DARTS_AI_Summary_BarChart:
    section_name: "8. DARTS: Event Summary"
  DARTS_AI_Volcano_SE:
    section_name: "8. DARTS: Volcano Plot"

# 4. RICERCA FILE (Solo per i file di testo)
sp:
  deseq2_summary: {fn: "deseq2_summary_mqc.txt"}
  imsig_abundance: {fn: "imsig_abundance_mqc.txt"}
  immucellai_abundance: {fn: "immucellai_abundance_mqc.txt"}
