report_comment: "Automated RNA-seq pipeline report. Integrated analysis of Quality Control, Alignment, Differential Expression, TME Deconvolution, and Alternative Splicing."
title: "RNA-seq Analysis Report"

# ==============================================================================
# 1. MAIN MODULE ORDER
# ==============================================================================
module_order:
  - fastqc:
      name: "FastQC (Raw Reads)"
      info: "Initial quality control of sequencing reads."
  - cutadapt:
      name: "Trim Galore"
      info: "Adapter trimming and quality filtering."
  - star:
      name: "STAR Alignment"
      info: "Alignment rates to the reference genome."
  - featurecounts:
      name: "featureCounts"
      info: "Gene-level read quantification."
      anchor: "module_featurecounts"
  - custom_content:
      name: "Downstream Analysis"
      anchor: "module_custom"

# ==============================================================================
# 2. CUSTOM SECTION ORDER
# ==============================================================================
report_section_order:
  darts_volcano:
    before: module_custom
  darts_summary:
    before: darts_volcano
  rmats_volcano:
    before: darts_summary
  rmats_summary:
    before: rmats_volcano
  arriba_fusions:
    before: rmats_summary
  immucellai_plot:
    before: arriba_fusions
  immucellai_abundance:
    before: immucellai_plot
  imsig_plot:
    before: immucellai_abundance
  imsig_abundance:
    before: imsig_plot
  enrichr_plots:
    before: imsig_abundance
  deseq2_volcano:
    before: enrichr_plots
  deseq2_pca:
    before: deseq2_volcano
  deseq2_summary:
    before: deseq2_pca

# ==============================================================================
# 3. CUSTOM DATA SETTINGS
# ==============================================================================
custom_data:
  deseq2_summary:
    section_name: "DESeq2: Differential Expression"
    description: "Number of up-regulated and down-regulated genes."
    plot_type: "bargraph"
  deseq2_pca:
    section_name: "DESeq2: PCA Plot"
    plot_type: "image"
  deseq2_volcano:
    section_name: "DESeq2: Volcano Plot"
    plot_type: "image"
  enrichr_plots:
    section_name: "EnrichR: Pathway Analysis"
    description: "Top enriched pathways (GO, KEGG, Reactome, etc.)."
    plot_type: "image"
  imsig_abundance:
    section_name: "ImSig: Deconvolution Data"
    description: "Relative immune infiltrate abundance calculated by ImSig."
    plot_type: "bargraph"
  imsig_plot:
    section_name: "ImSig: Composition Plot"
    plot_type: "image"
  immucellai_abundance:
    section_name: "ImmuCellAI: Fractions Data"
    description: "Estimated fractions for Tumor Microenvironment (TME) cell types."
    plot_type: "bargraph"
  immucellai_plot:
    section_name: "ImmuCellAI: Deconvolution Plot"
    plot_type: "image"
  rmats_summary:
    section_name: "rMATS: Event Summary"
    description: "Number of significant alternative splicing events."
    plot_type: "image"
  rmats_volcano:
    section_name: "rMATS: Volcano Plot"
    plot_type: "image"
  darts_summary:
    section_name: "DARTS: Event Summary"
    description: "Number of significant AI-predicted alternative splicing events."
    plot_type: "image"
  darts_volcano:
    section_name: "DARTS: Volcano Plot"
    plot_type: "image"

# ==============================================================================
# 4. SEARCH PATTERNS
# ==============================================================================
sp:
  deseq2_summary: {fn: "deseq2_summary_mqc.txt"}
  deseq2_pca: {fn: "*pca_mqc.png"}
  deseq2_volcano: {fn: "*volcano_mqc.png"}
  enrichr_plots: {fn: "Barplot_*_mqc.png"}
  imsig_abundance: {fn: "imsig_abundance_mqc.txt"}
  imsig_plot: {fn: "*imsig*_mqc.png"}
  immucellai_abundance: {fn: "immucellai_abundance_mqc.txt"}
  immucellai_plot: {fn: "*deconvolution*_mqc.png"}
  rmats_summary: {fn: "*rMATS_Summary_BarChart_mqc.png"}
  rmats_volcano: {fn: "*rMATS_Volcano_SE_mqc.png"}
  darts_summary: {fn: "*DARTS_AI_Summary_BarChart_mqc.png"}
  darts_volcano: {fn: "*DARTS_AI_Volcano_SE_mqc.png"}

# ==============================================================================
# 5. STRING CLEANUP
# ==============================================================================
extra_fn_clean_exts:
  - "_mqc"
  - "Barplot_"
  - "rMATS_"
  - "DARTS_AI_"
